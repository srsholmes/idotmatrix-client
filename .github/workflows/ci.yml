name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-cli
      - name: Run tests
        run: cd rust-cli && cargo test
      - name: Clippy
        run: cd rust-cli && cargo clippy -- -D warnings

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
